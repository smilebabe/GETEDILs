services:
  - type: web
    name: getedil-agent-service
    runtime: python
    repo: https://github.com/smilebabe/GETEDILs
    branch: main
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: getedil-db
          property: connectionString
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: NOTIFICATION_WEBHOOK
        sync: false
      - key: DB_POOL_SIZE
        value: "3"
      - key: BATCH_SIZE
        value: "25"
      - key: POLL_INTERVAL
        value: "15"
    healthCheckPath: /health
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
